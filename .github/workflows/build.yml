name: Lean CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: "lake build"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            -sSf | sh -s -- -y --default-toolchain leanprover/lean4:v4.12.0
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: lake update
        run: lake update

      - name: Get Mathlib olean cache
        run: lake exe cache get || true

      - name: lake build
        run: lake build

      - name: Check zero sorry
        run: |
          FOUND=$(grep -rn --include='*.lean' '\bsorry\b' Towers/YM/ KP/ || true)
          if [ -n "$FOUND" ]; then
            echo "FAIL: sorry found:"; echo "$FOUND"; exit 1
          fi
          echo "PASS: no sorry"
